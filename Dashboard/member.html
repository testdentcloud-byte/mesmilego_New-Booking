        body {
            font-family: 'Inter', sans-serif;

        .table-scroll-container::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        .table-scroll-container::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            /* slate-300 */
            border-radius: 3px;
        }
        
        .table-scroll-container::-webkit-scrollbar-track {
            background-color: #f1f5f9;
            /* slate-100 */
        }
        .spinner {
            width: 3rem;
            height: 3rem;
            border: .5rem solid #eee;
            border-top: .5rem solid #4ade80;
            /* green-400 */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none !important;
            /* Ensure override */
        }
    </style>

                    <div class="md:col-span-2 flex justify-end space-x-3">

                        <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-md text-sm flex items-center space-x-2 font-thai">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M7.5
                            1C6.11929 1 5 2.11929 5 3.5V4H4C3.44772 4 3 4.44772 3 5V17C3 17.5523 3.44772 18 4 18H16C16.5523 18 17 17.5523 17 17V5C17 4.44772 16.5523 4 16 4H15V3.5C15 2.11929 13.8807 1 12.5 1H7.5ZM7 3.5C7 3.22386 7.22386 3 7.5 3H12.5C12.7761 3 13 3.22386 13 3.5V4H7V3.5Z M6 6H14V16H6V6Z" /></svg>

            <div class="bg-white shadow rounded-lg overflow-hidden">
                <div id="loadingSpinner" class="flex justify-center items-center py-8 hidden">
                    <div class="spinner"></div>
                </div>
                <div id="memberTableContainer" class="overflow-x-auto table-scroll-container"></div>
            </div>

    <script src="Config.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        // ตรวจสอบสถานะล็อกอิน
        const isLoggedIn = localStorage.getItem('isAdminLoggedIn') === 'true';
        if (!isLoggedIn) {
        // ถ้าไม่ได้ล็อกอิน ให้เด้งไปหน้า login ทันที
        window.location.href = 'login.html';
        return; // หยุดการทำงานที่เหลือบนหน้านี้
        }
        
        // กรณีล็อกอินแล้ว ให้มาดึงชื่อ admin และโหลดข้อมูลสมาชิกตามเดิม
        const adminName = localStorage.getItem('adminName') || 'Admin';
        document.getElementById('adminName').textContent = adminName;
        const branchSelector = document.getElementById('branchSelector');
        await populateBranchSelector(branchSelector);
        branchSelector.addEventListener('change', function() {
            localStorage.setItem('branch', this.value);
            location.reload();
        });
        loadMembers();
        });
        
        // ฟังก์ชัน Logout (เหมือนเดิม)
        function logout() {
        localStorage.removeItem('isAdminLoggedIn');
        localStorage.removeItem('adminName');
        localStorage.removeItem('adminBranches');
        localStorage.removeItem('branch');
        window.location.href = 'login.html';
        }

        const memberSearchInput = document.getElementById('memberSearch');
        let allMembersData = []; // Store all members for client-side search

        function showForm(isEdit = false) {
            document.getElementById('formSection').classList.remove('hidden');
            if (!isEdit) {
                document.getElementById('memberForm').reset();
                document.querySelector('[name="รหัส"]').value = '';
            }
            document.getElementById('formSection').scrollIntoView({
                behavior: 'smooth'
            });
        }

        function hideForm() {
            document.getElementById('formSection').classList.add('hidden');
            document.getElementById('memberForm').reset();
        }

        document.getElementById('memberForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {};
            // Map ฟิลด์จากฟอร์มให้ตรงกับคอลัมน์ชีต
            data['รหัส'] = this['รหัส'].value;
            data['ไลน์ไอดี'] = this['ไลน์ไอดี'].value;
            data['ชื่อ'] = this['ชื่อ'].value;
            data['นามสกุล'] = this['นามสกุล'].value;
            data['เบอร์โทร'] = this['เบอร์โทร'].value;
            data['เลขบัตร/ประกัน'] = this['เลขบัตร/ประกัน'].value;
            data['โรค/แพ้'] = this['โรค/แพ้'].value;
            data['หมายเหตุ'] = this['หมายเหตุ'].value;
            // เพิ่ม branch
            data['branch'] = localStorage.getItem('branch') || '1';

            Swal.fire({
                title: 'กำลังบันทึก...',
                text: 'กรุณารอสักครู่',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            fetch(CONFIG_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'insertOrUpdateMember',
                        data
                    })
                })
                .then(response => response.json())
                .then(result => {
                    if (result.success || result.id) { // Check for success flag or returned ID
                        Swal.fire('สำเร็จ!', 'บันทึกข้อมูลสมาชิกเรียบร้อย', 'success');
                        this.reset();
                        document.getElementById('formSection').classList.add('hidden');
                        loadMembers(); // Reload to show updated data
                    } else {
                        Swal.fire('ผิดพลาด!', result.message || 'ไม่สามารถบันทึกข้อมูลได้', 'error');
                    }
                })
                .catch(error => {
                    console.error('Error submitting form:', error);
                    Swal.fire('ผิดพลาด!', 'เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
                });
        });

        function loadMembers() {
            const branch = localStorage.getItem('branch') || '1';
            const spinner = document.getElementById('loadingSpinner');
            const tableContainer = document.getElementById('memberTableContainer');
            spinner.classList.remove('hidden');
            tableContainer.classList.add('hidden');
            fetch(`${CONFIG_URL}?action=fetchMemberData&branch=${branch}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Network response was not ok: ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    allMembersData = data; // Store for searching
                    renderMemberTable(data);
                })
                .catch(error => {
                    console.error('Error loading members:', error);
                    tableContainer.innerHTML = `<p class=\"p-4 text-red-500 font-thai\">เกิดข้อผิดพลาดในการโหลดข้อมูลสมาชิก: ${error.message}</p>`;
                    Swal.fire('ผิดพลาด!', `ไม่สามารถโหลดข้อมูลสมาชิกได้: ${error.message}`, 'error');
                })
                .finally(() => {
                    spinner.classList.add('hidden');
                    tableContainer.classList.remove('hidden');
                });
        }

        function renderMemberTable(dataToRender) {
            let html = `<table class="min-w-full divide-y divide-slate-200 text-sm">
            <thead class="bg-slate-50">
                <tr>
                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider font-thai">รหัส</th>
                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider font-thai hidden">ไลน์ไอดี</th>
                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider font-thai">ชื่อ</th>
                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider font-thai">นามสกุล</th>
                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider font-thai">เบอร์โทร</th>
                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider font-thai">เลขบัตร/ประกัน</th>
                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider font-thai">โรค/แพ้</th>
                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider font-thai">หมายเหตุ</th>
                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider font-thai">เวลาบันทึก</th>
                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider font-thai">จัดการ</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-slate-200">`;

            if (dataToRender.length === 0) {
                html += `<tr><td colspan="10" class="px-4 py-4 text-center text-slate-500 font-thai">ไม่พบข้อมูลสมาชิก</td></tr>`;
            } else {
                dataToRender.forEach(member => {
                    html += `<tr class="hover:bg-slate-50">
                <td class="px-4 py-3 whitespace-nowrap text-slate-700 font-mono text-xs">${member['รหัส'] || '-'}</td>
                <td class="px-4 py-3 whitespace-nowrap text-slate-600 font-thai hidden">${member['ไลน์ไอดี'] || '-'}</td>
                <td class="px-4 py-3 whitespace-nowrap text-slate-800 font-medium font-thai">${member['ชื่อ'] || '-'}</td>
                <td class="px-4 py-3 whitespace-nowrap text-slate-800 font-medium font-thai">${member['นามสกุล'] || '-'}</td>
                <td class="px-4 py-3 whitespace-nowrap text-slate-600 font-thai">${member['เบอร์โทร'] || '-'}</td>
                <td class="px-4 py-3 whitespace-nowrap text-slate-600 font-thai">${member['เลขบัตร/ประกัน'] || '-'}</td>
                <td class="px-4 py-3 whitespace-nowrap text-slate-600 font-thai">${member['โรค/แพ้'] || '-'}</td>
                <td class="px-4 py-3 whitespace-nowrap text-slate-600 font-thai">${member['หมายเหตุ'] || '-'}</td>
                <td class="px-4 py-3 whitespace-nowrap text-slate-500 text-xs font-thai">${member['เวลาบันทึก'] ? member['เวลาบันทึก'] : '-'}</td>
                <td class="px-4 py-3 whitespace-nowrap text-sm font-medium">
                    <button onclick="editMember('${member['รหัส']}')" class="text-green-600 hover:text-green-900 mr-3 font-thai">แก้ไข</button>
                    <button onclick="deleteMember('${member['รหัส']}')" class="text-red-600 hover:text-red-900 font-thai">ลบ</button>
                </td>
            </tr>`;
                });
            }
            html += '</tbody></table>';
            document.getElementById('memberTableContainer').innerHTML = html;
        }

        memberSearchInput.addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredMembers = allMembersData.filter(member => {
                return (member['ชื่อ'] && member['ชื่อ'].toLowerCase().includes(searchTerm)) ||
                    (member['นามสกุล'] && member['นามสกุล'].toLowerCase().includes(searchTerm)) ||
                    (member['เบอร์โทร'] && member['เบอร์โทร'].includes(searchTerm)) ||
                    (member['เลขบัตร/ประกัน'] && member['เลขบัตร/ประกัน'].includes(searchTerm)) ||
                    (member['หมายเหตุ'] && member['หมายเหตุ'].toLowerCase().includes(searchTerm)) ||
                    (member['รหัส'] && member['รหัส'].toLowerCase().includes(searchTerm));
            });
            renderMemberTable(filteredMembers);
        });


        function editMember(id) {
            // Assuming allMembersData is up-to-date from loadMembers()
            const memberToEdit = allMembersData.find(m => m['รหัส'] === id);
            if (!memberToEdit) {
                Swal.fire('ไม่พบข้อมูล', `ไม่พบสมาชิก รหัส: ${id}`, 'warning');
                return;
            }

            const form = document.getElementById('memberForm');
            // Map ข้อมูลให้ตรงกับ input แต่ละช่อง
            form['รหัส'].value = memberToEdit['รหัส'] || '';
            form['ไลน์ไอดี'].value = memberToEdit['ไลน์ไอดี'] || '';
            form['ชื่อ'].value = memberToEdit['ชื่อ'] || '';
            form['นามสกุล'].value = memberToEdit['นามสกุล'] || '';
            form['เบอร์โทร'].value = memberToEdit['เบอร์โทร'] || '';
            form['เลขบัตร/ประกัน'].value = memberToEdit['เลขบัตร/ประกัน'] || '';
            form['โรค/แพ้'].value = memberToEdit['โรค/แพ้'] || '';
            form['หมายเหตุ'].value = memberToEdit['หมายเหตุ'] || '';
            showForm(true); // Pass true to indicate it's an edit
        }

        function deleteMember(id) {
            Swal.fire({
                title: 'ต้องการลบสมาชิก?',
                text: `คุณแน่ใจหรือไม่ว่าต้องการลบสมาชิกไอดี: ${id}? การกระทำนี้ไม่สามารถย้อนกลับได้!`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'ใช่, ลบเลย!',
                cancelButtonText: 'ยกเลิก',
                customClass: {
                    popup: 'font-thai', // Apply Thai font to SweetAlert
                    title: 'font-thai',
                    htmlContainer: 'font-thai',
                    confirmButton: 'font-thai',
                    cancelButton: 'font-thai'
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({
                        title: 'กำลังลบ...',
                        allowOutsideClick: false,
                        didOpen: () => Swal.showLoading()
                    });
                    fetch(CONFIG_URL, {
                            method: 'POST',
                            body: JSON.stringify({
                                    action: 'deleteMember',
                                    id: id,
                                    branch: localStorage.getItem('branch') || '1'
                                }) // Ensure 'id' matches GAS parameter
                        })
                        .then(response => response.json())
                        .then(res => {
                            if (res.success) {
                                Swal.fire('ลบสำเร็จ!', 'สมาชิกถูกลบออกจากระบบแล้ว', 'success');
                                loadMembers(); // Refresh the list
                            } else {
                                Swal.fire('ผิดพลาด!', res.message || 'ไม่สามารถลบสมาชิกได้', 'error');
                            }
                        })
                        .catch(error => {
                            console.error('Error deleting member:', error);
                            Swal.fire('ผิดพลาด!', 'เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
                        });
                }
            });
        }

        // Initial load
        loadMembers();
    </script>
</body>

</html>
